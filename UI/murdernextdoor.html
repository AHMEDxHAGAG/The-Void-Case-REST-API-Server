<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Detective Game</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap');
  body {
    margin: 0;
    background: #0a0f1e;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: 'Rajdhani', sans-serif;
    color: #f0e6f5;
    overflow: hidden;
    user-select: none;
  }
  #global-back-btn {
    width: 960px;
    margin-bottom: 10px;
    display: none;
    text-align: left;
    z-index: 10000;
  }
  .plain-btn {
    color: #f0e6f5;
    font-family: 'JetBrains Mono', monospace;
    cursor: pointer;
    font-size: 14px;
    background: transparent;
    border: none;
    padding: 0;
  }
  .plain-btn:hover {
    color: #00f5d4;
  }
  #game-wrapper {
    width: 960px;
    height: 640px;
    position: relative;
    box-shadow: 0 0 20px rgba(0,0,0,0.5);
    cursor: default;
  }
  .screen {
    width: 100%;
    height: 100%;
    position: absolute;
    top: 0; left: 0;
    display: none;
    background: #0d0514;
    border: 2px solid #00aaff;
    box-sizing: border-box;
  }
  .screen.active {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }
  /* Terminal text */
  .term-text {
    font-family: 'JetBrains Mono', monospace;
    font-size: 16px;
    margin-bottom: 10px;
    text-align: center;
    pointer-events: none;
  }
  /* Prologue */
  #screen-prologue { cursor: pointer; }
  #prologue-text-container {
    opacity: 1;
    transition: opacity 150ms ease-in-out;
    pointer-events: none;
  }
  #prologue-text-container.fade-out {
    opacity: 0;
  }
  /* Title card */
  #screen-titlecard { opacity: 1; transition: opacity 150ms ease-in-out; }
  #screen-titlecard.fade-out { opacity: 0; }
  #screen-titlecard .title-text {
    font-family: 'Rajdhani', sans-serif;
    font-size: 64px;
    font-weight: 900;
    letter-spacing: 8px;
    color: #f0e6f5;
    text-align: center;
  }
  /* Modal */
  .modal-overlay {
    position: absolute;
    top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(13, 5, 20, 0.9);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 99999;
  }
  .modal-content {
    background: #1a0f2e;
    border: 2px solid #4fc3f7;
    padding: 30px;
    width: 600px;
    max-width: 80%;
  }
  .modal-title { font-family: 'Rajdhani', sans-serif; font-size: 24px; font-weight: bold; color: #4fc3f7; margin-bottom: 10px; }
  .modal-desc { font-family: 'JetBrains Mono', monospace; font-size: 14px; color: #f0e6f5; margin-bottom: 20px; line-height: 1.5; }
  .close-btn { font-family: 'JetBrains Mono', monospace; cursor: pointer; color: #ff3366; background: none; border: none; font-size: 16px; padding: 0; }
  
  .game-container-div {
    width: 100%;
    height: 100%;
    display: none;
  }
  .game-container-div.active {
    display: block;
  }
</style>
<script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
</head>
<body>

<div id="global-back-btn">
  <button class="plain-btn" onclick="returnToSelection()">[ BACK TO CASES ]</button>
</div>

<div id="game-wrapper">
  <!-- Screens -->
  <div id="screen-prologue" class="screen" onclick="advancePrologue()">
    <div id="prologue-text-container" class="term-text"></div>
    <div id="prologue-continue" class="plain-btn" style="margin-top: 40px; color:#4fc3f7;">[ CLICK TO CONTINUE ]</div>
  </div>

  <div id="screen-titlecard" class="screen">
    <div class="title-text">MURDER NEXT DOOR</div>
  </div>

  <div id="screen-selection" class="screen">
    <div class="term-text" style="font-size:24px; font-weight:bold; color:#4fc3f7; margin-bottom:30px;">CASE SELECTION</div>
    <div id="auth-status" class="term-text" style="font-size:12px; margin-bottom:20px; color:#f0e6f5;"></div>
    
    <div style="display:flex; flex-direction:column; gap:15px; width:400px;">
      <button id="btn-case-void" class="plain-btn" style="border:1px solid #4fc3f7; padding:15px;" onclick="launchCase('void')">1. THE VOID CASE</button>
      <button id="btn-case-atlantic" class="plain-btn" style="border:1px solid #4fc3f7; padding:15px;" onclick="launchCase('atlantic')">2. THE ATLANTIC WOLFFISH CASE</button>
      <button id="btn-case-hope" class="plain-btn" style="border:1px solid #4fc3f7; padding:15px;" onclick="launchCase('hope')">3. THE H.O.P.E. CASE</button>
      <button id="btn-case-starry" class="plain-btn" style="border:1px solid #4fc3f7; padding:15px;" onclick="launchCase('starry')">4. THE STARRY-EYED REHEARSAL CASE</button>
    </div>

    <div style="margin-top: 40px; display:flex; gap:20px;">
      <button class="plain-btn" style="color:#00f5d4;" onclick="showScreen('screen-login')">[ LOGIN / SIGN UP ]</button>
      <button class="plain-btn" style="color:#00f5d4;" onclick="showLeaderboard()">[ LEADERBOARD ]</button>
    </div>
  </div>

  <div id="screen-login" class="screen">
    <div class="term-text" style="font-size:20px; color:#4fc3f7; margin-bottom:20px;">SYSTEM AUTHENTICATION</div>
    <div style="display:flex; flex-direction:column; gap:10px; width:300px;">
      <div style="display:flex; justify-content:space-between;">
        <span class="term-text" style="margin:0;">USERNAME:</span>
        <input type="text" id="inp-user" style="background:transparent; border:1px solid #4fc3f7; color:#f0e6f5; font-family:'JetBrains Mono';">
      </div>
      <div style="display:flex; justify-content:space-between;">
        <span class="term-text" style="margin:0;">PASSWORD:</span>
        <input type="password" id="inp-pass" style="background:transparent; border:1px solid #4fc3f7; color:#f0e6f5; font-family:'JetBrains Mono';">
      </div>
    </div>
    <div id="auth-msg" class="term-text" style="margin-top:20px; color:#ff3366; min-height:20px;"></div>
    <div style="margin-top: 30px; display:flex; gap:20px;">
      <button class="plain-btn" style="color:#00f5d4;" onclick="doLogin()">[ LOGIN ]</button>
      <button class="plain-btn" style="color:#00f5d4;" onclick="doSignup()">[ SIGN UP ]</button>
    </div>
    <button class="plain-btn" style="margin-top:30px;" onclick="showScreen('screen-selection')">[ BACK ]</button>
  </div>

  <div id="screen-leaderboard" class="screen">
    <div class="term-text" style="font-size:20px; color:#4fc3f7; margin-bottom:20px;">LEADERBOARD</div>
    <div id="lb-content" class="term-text" style="text-align:left; line-height:2;"></div>
    <button class="plain-btn" style="margin-top:40px;" onclick="showScreen('screen-selection')">[ BACK ]</button>
  </div>

  <!-- Phaser Containers -->
  <div id="game-void" class="game-container-div"></div>
  <div id="game-atlantic" class="game-container-div"></div>
  <div id="game-hope" class="game-container-div"></div>
  <div id="game-starry" class="game-container-div"></div>

  <!-- Modals -->
  <div id="evidence-modal" class="modal-overlay">
    <div class="modal-content">
      <div id="ev-title" class="modal-title">EVIDENCE</div>
      <div id="ev-desc" class="modal-desc">Description</div>
      <button class="close-btn" onclick="closeModal()">[X] CLOSE</button>
    </div>
  </div>
</div>

<script>
// --- MOCK DB ---
const mockDB = {
  users: [
    { username: "admin",  password: "123", points: 9999, role: "admin"  },
    { username: "player", password: "456", points: 350,  role: "player" }
  ]
};

const EVIDENCE_DESCRIPTIONS = {"void":{"STABBING VICTIM":"Multiple thin, deep stab wounds on both back and front. Stuffed into a space suit after death. A lot of blood beneath the suit.","WET SPACE SUIT":"The suit the victim was found in is wet on the outside, indicating recent use.","MISSING SUIT STAND":"One display stand is empty. A suit is gone.","KNOCKOUT GAS INFO":"Only sold in packages of three. Always three.","OBJECT TRAIL":"Random small objects placed in a deliberate path from the entrance to a specific floor panel circled by objects.","ONE-WAY PANEL":"The circled panel is a one-way mirror with a knife-sized hole drilled through it. Heavy blood on top.","FRAMING PHONE":"A new phone with no owner in the group. Fresh number. Full of texts used to orchestrate the killings. Left deliberately.","KNOCKOUT GAS BOTTLE":"Used and shattered. One of three from the only pack sold.","THE COURIER'S ACCOUNT":"Witnessed the stabbing but saw nothing sharp. Panicked and fled.","THE DRIFTER'S ACCOUNT":"Texted to the labyrinth at midnight, then pushed into the lower maze and framed with the phone.","BROADCAST RECORDING":"Pre-recorded video of a cloaked, masked figure with a modified voice, directing the group to search specific locations. Made to appear live.","ANONYMOUS LETTER":"Sent to the hosts earlier, instructing them to film in the plaza and leave the studio free. No name.","THE OBSERVER'S ACCOUNT":"Refused to help but told The Scheduler where The Operator was. Stayed silent about the rest.","SAWN VICTIM":"Bound to a mirror panel by ropes near the gate. The metal saw fell directly on him when the gates opened, killing him from severe blood loss.","RIGGED SAW":"Battery-powered, no outlet required. Set to fall when the gate opened.","VOID PANEL":"The same type of one-way mirror panel as in the labyrinth.","FLASH DRIVE":"Left plugged into the broadcasting desk. Contains the recorded video file used in the broadcast."},"atlantic":{"VICTIM AUTOPSY":"Found dead in the pool, three stab wounds in the abdomen, bled into the water.","PHOTOGRAPHER STATE":"Knocked out, lying on his back. A knife stabbed through his right hand. A visible shoe print bruised into his face.","BLOODY DRAG MARKS":"A blood trail from the floor beside the pool leading to the pool edge.","THE KNIFE":"Stabbed into The Photographer's right hand.","POOL COVER":"Activated, covering the pool and the body beneath it.","BROKEN WHEELCHAIR":"Thrown into a corner, broken, lying over The Assistant.","SAUNA CAMERA":"One of the cameras found under the wheelchair. Still functional. Shows Suspect entering at 2:45 PM.","INTERVAL TIMER":"Takes a photo every 20 minutes automatically.","HALLWAY PHOTOS":"2:40 PM - The Victim closing her cabin door.","LAUNDRY LOGS":"The train laundry service disposes of clothes entirely rather than washing them. The Suspect was the last person to use the service.","KITCHEN CAMERA":"Facing a wall. Repositioned to avoid capturing the killer.","KNIFE CABINET":"Unlocked. The nylon camera straps that had been looped around the handles to keep it closed are now cut on the floor, cut in a rough, messy way.","CUT STRAPS":"Nylon straps from the cameras cut in a messy way.","HOOF KNIFE":"A sharp hoof knife discarded in the trash bin. Not a standard kitchen item.","SUSPECT'S ACCOUNT":"Claimed she only passed by the sauna later and fought in self defense.","PHOTOGRAPHER ACCOUNT":"Stumbled onto the murder, pushed out of wheelchair, stabbed in hand and face stomped."},"hope":{"AUTOPSY REPORT":"Burned alive inside the prison cell. Cause of death: potassium chlorate ignition from the tipped bucket.","GUMMY BEAR PACKETS":"Multiple empty packets discarded in front of the gate. Suggests someone spent time waiting there.","SUSPENDED BUCKET":"An empty bucket found inside the cell, suspended with rope above the burned remains. This held the incendiary solution.","EMPTY BUCKET":"An empty bucket found outside the cell by the gate.","BOARDED VENTS":"The vents are nailed shut with wooden planks, sealing the room. Done before the murder.","LAB NOTE":"Written instructions for synthesizing potassium chlorate from calcium hypochlorite, potassium chloride, water, heat, and filtration.","CALCIUM HYPOCHLORITE":"Empty calcium hypochlorite bucket. The supply was fully used.","SALT FREE BOTTLE":"Potassium chloride (KCl). Used in the synthesis.","BLOW TORCH":"Present on the chemistry lab table.","CHEM 4 MORONS":"Two large volumes on chemistry by a Dr. Howard Light. Too large to read fully before the trial.","HOW 2 MATHS":"Two large volumes on mathematics by the same author.","THE ROPE":"Two rope sets. The second runs from the cell all the way to the train room. Total assembled length: 58 metres.","TRAIN PATH":"The train runs on a circular track with a radius of 17 metres. It only moves when someone is inside it.","KNOCKOUT GAS":"A used and shattered knockout gas bottle. Victim was incapacitated before mechanism was setup.","THE CHEMIST'S LOG":"Fascinating setup. Synthesizing KClO3 is basic high school chemistry.","THE GUARD'S ACCOUNT":"Smelled something sweet before the fire. Like burning sugar.","THE DRIVER'S ALIBI":"This beauty only moves when someone is at the controls."},"starry":{"THE BLOODY NOTE":"A non-prop note reading 'You'll pay for betraying me.' Has a bullet hole through it.","STARRY NIGHT HOLE":"The bullet continued through The Lead's chest, through the hanging Starry Night replica, and into the set wall behind it.","FAKE BLOOD":"A satchel of fake blood hidden inside his costume to simulate being shot. Never triggered.","THE SET DOOR":"The door through which The Shooter was to have exited after the final scene.","DISCARDED SWITCH":"The remote switch that should have detonated The Lead's fake blood satchel. Discarded in a rubbish bin.","REPLICA GUN CASE":"Contains one replica gun. The case has space for two. The second gun is missing.","THE REVOLVER":"The weapon that killed The Lead. Five unused bullets remaining.","THE OIL TRAIL":"A smear of dark oil along the back wall, connects backstage left to backstage right.","LIGHTING CUES":"Lighting console controls all stage lights. The bridge oversees the entire set.","SCRIPT NOTES":"The director's annotated script. No mention of any betrayal note.","STAGE POSITIONS":"Shows exactly where each actor stood. The killer knew his exact mark.","FOURTH'S ACCOUNT":"Walked into the scene right on cue. Gunshot was deafening.","MANAGER'S ACCOUNT":"Was running the console when the shot rang out.","SHOOTER'S ACCOUNT":"Fired the prop gun, put it back in the case. Got oil on hands.","THIRD'S ACCOUNT":"Struck from behind in the dark wings, woke up holding the real gun."}};
const CASE_SYNOPSES = {"void":"On Halloween night, four people are killed across several locations in the underground facility. The investigation begins after a pre-recorded broadcast instructs the group to search specific areas. A fifth victim dies as a rigged saw falls.","atlantic":"On the day of the deadline, a murder takes place in the spa and sauna car of a moving train. The victim is found dead in the pool, having been stabbed three times in the abdomen.","hope":"The Chef is found burned alive inside a prison cell. An empty bucket suspended above her body by rope was used to deliver an incendiary chemical solution onto her, triggered by a moving train.","starry":"During a live performance, The Lead is shot through the chest with a single bullet at close range. A non-prop note reading 'You'll pay for betraying me' is found near the body."};

function mockLogin(u, p) {
  return new Promise(res => {
    const user = mockDB.users.find(x => x.username === u && x.password === p);
    if (user) res({ success: true, user: { username: user.username, role: user.role, token: "mock-token-" + user.username } });
    else res({ success: false, msg: 'AUTH FAILED. INVALID CREDENTIALS.' });
  });
}

function mockSignup(u, p) {
  return new Promise(res => {
    if (mockDB.users.find(x => x.username === u)) res({ success: false, msg: 'REGISTRATION FAILED. USERNAME ALREADY TAKEN.' });
    else {
      const nu = { username: u, password: p, points: 0, role: "player" };
      mockDB.users.push(nu);
      res({ success: true, user: { username: nu.username, role: nu.role, token: "mock-token-" + nu.username } });
    }
  });
}

function mockGetLeaderboard() {
  return new Promise(res => {
    const sorted = [...mockDB.users].sort((a,b) => b.points - a.points);
    res(sorted);
  });
}

function mockAwardPoints(caseId) {
  return new Promise(res => {
    const pointsMap = { void: 100, atlantic: 200, hope: 300, starry: 400 };
    const pts = pointsMap[caseId];
    const uname = localStorage.getItem('username');
    if (uname) {
      const u = mockDB.users.find(x => x.username === uname);
      if (u) u.points += pts;
    }
    res();
  });
}

function mockFetchHint(req) {
  return new Promise(res => {
    console.log("Mock AI Prompt sent:\n", req.systemPrompt);
    res({ hint: "You should look closer at the evidence you just collected. The answer is right in front of you." });
  });
}

// --- GLOBAL UI STATE ---
let currentScreen = null;
let currentCase = null;

function showScreen(id) {
  document.querySelectorAll('.screen, .game-container-div').forEach(el => el.classList.remove('active'));
  const target = document.getElementById(id);
  if (target) target.classList.add('active');
  currentScreen = id;
  document.getElementById('global-back-btn').style.display = (id.startsWith('game-')) ? 'block' : 'none';
  
  if (id === 'screen-selection') refreshSelection();
}

// --- PROLOGUE ---
const prologueLines = [
  "They say the dead can't speak.",
  "They're wrong.",
  "Every crime scene is a sentence waiting to be read.",
  "I've been reading them for years.",
  "Four cases. Four rooms full of lies.",
  "Someone always thinks they got away with it.",
  "They never do.",
  "Not on my watch.",
  "The truth doesn't hide. It just waits for someone patient enough to find it.",
  "Let's get to work."
];
let prologueIdx = 0;
let prologueBusy = false;

function advancePrologue() {
  if (prologueBusy) return;
  prologueBusy = true;

  const container = document.getElementById('prologue-text-container');
  const btn = document.getElementById('prologue-continue');
  
  container.classList.add('fade-out');
  
  const finalize = () => {
    if (prologueIdx >= prologueLines.length) {
      sessionStorage.setItem('prologueSeen', 'true');
      showTitleCard();
    } else {
      container.innerText = "> " + prologueLines[prologueIdx];
      if (prologueIdx === prologueLines.length - 1) {
        btn.innerText = "[ BEGIN ]";
      }
      prologueIdx++;
      container.classList.remove('fade-out');
      prologueBusy = false;
    }
  };

  // Fallback for transitionend
  let fired = false;
  const onEnd = () => {
    if (fired) return;
    fired = true;
    container.removeEventListener('transitionend', onEnd);
    finalize();
  };
  container.addEventListener('transitionend', onEnd);
  setTimeout(onEnd, 200);
}

document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') closeModal();
});

// --- AUTH & SELECTION ---
function refreshSelection() {
  const uname = localStorage.getItem('username');
  const role = localStorage.getItem('role');
  const st = document.getElementById('auth-status');
  if (uname) st.innerText = "LOGGED IN AS: " + uname + (role === 'admin' ? " [ADMIN]" : "");
  else st.innerText = "NO USER LOGGED IN";

  const c1 = localStorage.getItem('case_void_done') === 'true';
  const c2 = localStorage.getItem('case_atlantic_done') === 'true';
  const c3 = localStorage.getItem('case_hope_done') === 'true';
  const c4 = localStorage.getItem('case_starry_done') === 'true';

  const btnV = document.getElementById('btn-case-void');
  const btnA = document.getElementById('btn-case-atlantic');
  const btnH = document.getElementById('btn-case-hope');
  const btnS = document.getElementById('btn-case-starry');

  // Case 1 always unlocked, never shows [LOCKED] or [CLOSED]
  btnV.innerText = c1 ? "[SOLVED] THE VOID CASE" : "THE VOID CASE";
  btnV.disabled = false;
  btnV.style.borderColor = "#4fc3f7";

  btnA.disabled = !c1;
  btnA.innerText = !c1 ? "[LOCKED] THE ATLANTIC WOLFFISH CASE" : (c2 ? "[SOLVED] THE ATLANTIC WOLFFISH CASE" : "THE ATLANTIC WOLFFISH CASE");
  btnA.style.borderColor = !c1 ? "#555" : "#4fc3f7";

  btnH.disabled = !c2;
  btnH.innerText = !c2 ? "[LOCKED] THE H.O.P.E. CASE" : (c3 ? "[SOLVED] THE H.O.P.E. CASE" : "THE H.O.P.E. CASE");
  btnH.style.borderColor = !c2 ? "#555" : "#4fc3f7";

  btnS.disabled = !c3;
  btnS.innerText = !c3 ? "[LOCKED] THE STARRY-EYED REHEARSAL CASE" : (c4 ? "[SOLVED] THE STARRY-EYED REHEARSAL CASE" : "THE STARRY-EYED REHEARSAL CASE");
  btnS.style.borderColor = !c3 ? "#555" : "#4fc3f7";
}

async function doLogin() {
  const u = document.getElementById('inp-user').value;
  const p = document.getElementById('inp-pass').value;
  const msg = document.getElementById('auth-msg');
  const res = await mockLogin(u, p);
  if (res.success) {
    localStorage.setItem('username', res.user.username);
    localStorage.setItem('role', res.user.role);
    localStorage.setItem('token', res.user.token);
    msg.style.color = '#00f5d4';
    msg.innerText = "ACCESS GRANTED. WELCOME, " + u.toUpperCase() + ".";
    setTimeout(() => { showScreen('screen-selection'); msg.innerText=''; }, 1500);
  } else {
    msg.style.color = '#ff3366';
    msg.innerText = res.msg;
  }
}

async function doSignup() {
  const u = document.getElementById('inp-user').value;
  const p = document.getElementById('inp-pass').value;
  const msg = document.getElementById('auth-msg');
  if(!u || !p) { msg.innerText = "USERNAME AND PASSWORD REQUIRED."; return; }
  const res = await mockSignup(u, p);
  if (res.success) {
    localStorage.setItem('username', res.user.username);
    localStorage.setItem('role', res.user.role);
    localStorage.setItem('token', res.user.token);
    msg.style.color = '#00f5d4';
    msg.innerText = "ACCOUNT CREATED. ACCESS GRANTED. WELCOME, " + u.toUpperCase() + ".";
    setTimeout(() => { showScreen('screen-selection'); msg.innerText=''; }, 1500);
  } else {
    msg.style.color = '#ff3366';
    msg.innerText = res.msg;
  }
}

async function showLeaderboard() {
  const lb = document.getElementById('lb-content');
  lb.innerHTML = "LOADING...";
  showScreen('screen-leaderboard');
  const data = await mockGetLeaderboard();
  lb.innerHTML = data.map((u, i) => `${i+1}. ${u.username} — ${u.points} PTS`).join('<br>');
}

// --- GAME LOGIC ---
const gamesInit = { void:false, atlantic:false, hope:false, starry:false };

function launchCase(id) {
  currentCase = id;
  showScreen('game-' + id);
  if (!gamesInit[id]) {
    gamesInit[id] = true;
    if (id === 'void') initVoid();
    else if (id === 'atlantic') initAtlantic();
    else if (id === 'hope') initHope();
    else if (id === 'starry') initStarry();
  } else {
    // Replay: trigger restart logic in the game
    const g = (window.Phaser && Phaser.GAMES && Phaser.GAMES.find(x => x.config.parent === 'game-' + id));
    if (g) {
        const sc = g.scene.getScene('EndingScene') || g.scene.getScene('GameScene') || g.scene.getScene('BootScene');
        if (sc) {
            sc.registry.set('gameState', sc.registry.get('initialGameState') || sc.registry.get('gameState'));
            sc.scene.start('IntroScene');
        }
    }
  }
}

function returnToSelection() {
  currentCase = null;
  showScreen('screen-selection');
}

window._postCaseId = null;
window.showPostCaseMenu = function(id) {
  window._postCaseId = id;
  const names = { void:'THE VOID CASE', atlantic:'THE ATLANTIC WOLFFISH CASE', hope:'THE H.O.P.E. CASE', starry:'THE STARRY-EYED CASE' };
  document.getElementById('postcase-name').innerText = names[id] || '';
  document.getElementById('postcase-overlay').style.display = 'flex';
};
function postCaseReplay() {
  const id = window._postCaseId;
  document.getElementById('postcase-overlay').style.display = 'none';
  // Force a clean restart of the case
  gamesInit[id] = false;
  // Destroy any existing Phaser game for that case
  if (window.Phaser && Phaser.GAMES) {
    Phaser.GAMES.forEach(g => { if (g && g.config && g.config.parent === 'game-' + id) { try { g.destroy(true); } catch(e){} } });
  }
  const container = document.getElementById('game-' + id);
  if (container) container.innerHTML = '';
  launchCase(id);
}
function postCaseReturn() {
  document.getElementById('postcase-overlay').style.display = 'none';
  window._postCaseId = null;
  returnToSelection();
}


function completeCase(id) {
  localStorage.setItem('case_' + id + '_done', 'true');
  const awardedKey = 'awarded_' + id;
  if (!sessionStorage.getItem(awardedKey)) {
    sessionStorage.setItem(awardedKey, 'true');
    mockAwardPoints(id);
  }
}

// --- MODAL ---
function openEvidenceModal(caseId, evId) {
  const desc = EVIDENCE_DESCRIPTIONS[caseId] && EVIDENCE_DESCRIPTIONS[caseId][evId] ? EVIDENCE_DESCRIPTIONS[caseId][evId] : "Description not found.";
  document.getElementById('ev-title').innerText = evId;
  document.getElementById('ev-desc').innerText = desc;
  document.getElementById('evidence-modal').style.display = 'flex';
}

function closeModal() {
  document.getElementById('evidence-modal').style.display = 'none';
}

async function showAIHint(caseId, inventoryIds, sceneContext) {
  const inventory = inventoryIds.map(id => ({ id, name: id, description: (EVIDENCE_DESCRIPTIONS[caseId] && EVIDENCE_DESCRIPTIONS[caseId][id]) || "" }));
  
  const sysPrompt = `You are a mysterious in-world AI assistant for a detective mystery game.
You know everything about the case the player is currently investigating but you never directly reveal the killer's name or the solution outright.
You speak in a terse, noir detective tone — short sentences, atmospheric, slightly cryptic.
You have access to the player's current evidence inventory (provided in the request).
Use the inventory to give contextually relevant hints — reference items the player already has.
The current case is: ${caseId}.
Case synopsis: ${CASE_SYNOPSES[caseId]}
Key evidence: ${inventory.map(i=>i.name).join(', ')}
Respond in 2–4 sentences maximum. Stay in character at all times.`;

  const res = await mockFetchHint({ caseId, inventory, systemPrompt: sysPrompt });
  
  if (sceneContext && sceneContext.showDialogue) {
    sceneContext.showDialogue([ { speaker:'ANONYMOUS TIP', portrait:'portrait_mystery', text: res.hint, italic:true } ]);
  }
}

function showTitleCard() {
  showScreen('screen-titlecard');
  const el = document.getElementById('screen-titlecard');
  el.classList.remove('fade-out');
  setTimeout(() => {
    el.classList.add('fade-out');
    setTimeout(() => {
      showScreen('screen-selection');
      const sel = document.getElementById('screen-selection');
      sel.style.opacity = '0';
      sel.style.transition = 'opacity 150ms ease-in-out';
      requestAnimationFrame(() => { sel.style.opacity = '1'; });
      setTimeout(() => { sel.style.transition = ''; sel.style.opacity = ''; el.classList.remove('fade-out'); }, 200);
    }, 160);
  }, 2000);
}

window.onload = () => {
  if (!sessionStorage.getItem('prologueSeen')) {
    showScreen('screen-prologue');
    advancePrologue();
  } else {
    showScreen('screen-selection');
  }
};

function drawCornerMarks(s, x, y, w, h, color, len) {
  len = len || 14;
  const g = s.add.graphics();
  g.lineStyle(2, color, 1);
  g.beginPath(); g.moveTo(x, y+len); g.lineTo(x, y); g.lineTo(x+len, y); g.strokePath();
  g.beginPath(); g.moveTo(x+w-len, y+h); g.lineTo(x+w, y+h); g.lineTo(x+w, y+h-len); g.strokePath();
  return g;
}

function drawAllCornerMarks(s, x, y, w, h, color, len) {
  len = len || 16;
  const g = s.add.graphics();
  g.lineStyle(2, color, 1);
  g.beginPath(); g.moveTo(x, y+len); g.lineTo(x, y); g.lineTo(x+len, y); g.strokePath();
  g.beginPath(); g.moveTo(x+w-len, y); g.lineTo(x+w, y); g.lineTo(x+w, y+len); g.strokePath();
  g.beginPath(); g.moveTo(x, y+h-len); g.lineTo(x, y+h); g.lineTo(x+len, y+h); g.strokePath();
  g.beginPath(); g.moveTo(x+w-len, y+h); g.lineTo(x+w, y+h); g.lineTo(x+w, y+h-len); g.strokePath();
  return g;
}

function drawCanvasFrame(s) {
  const g = s.add.graphics();
  g.lineStyle(2, C.ACCENT, 1);
  g.strokeRect(1, 1, 958, 638);
  g.setDepth(9999);
  const len = 22;
  const cg = s.add.graphics();
  cg.lineStyle(3, C.ACCENT, 1);
  cg.beginPath(); cg.moveTo(0, len); cg.lineTo(0, 0); cg.lineTo(len, 0); cg.strokePath();
  cg.beginPath(); cg.moveTo(960-len, 0); cg.lineTo(960, 0); cg.lineTo(960, len); cg.strokePath();
  cg.beginPath(); cg.moveTo(0, 640-len); cg.lineTo(0, 640); cg.lineTo(len, 640); cg.strokePath();
  cg.beginPath(); cg.moveTo(960-len, 640); cg.lineTo(960, 640); cg.lineTo(960, 640-len); cg.strokePath();
  cg.setDepth(9999);
  return [g, cg];
}

function makeButton(s, x, y, w, h, label, opts) {
  opts = opts || {};
  const fontSize = opts.fontSize || 14;
  const cont = s.add.container(x, y);
  const bg = s.add.rectangle(0, 0, w, h, C.BG_PANEL, 1).setOrigin(0,0).setStrokeStyle(2, C.ACCENT);
  const txt = s.add.text(w/2, h/2, label, {
    fontFamily: F.UI, fontSize: fontSize+'px', fontStyle:'600',
    color: C.ACCENT_S
  }).setOrigin(0.5);
  cont.add([bg, txt]);
  bg.setInteractive({ useHandCursor:true });
  bg.on('pointerover', () => { bg.setFillStyle(C.ACCENT, 1); txt.setColor(C.BG_DEEP_S); });
  bg.on('pointerout',  () => { bg.setFillStyle(C.BG_PANEL, 1); txt.setColor(C.ACCENT_S); });
  if (opts.onClick) bg.on('pointerdown', opts.onClick);
  cont.bg = bg; cont.txt = txt;
  return cont;
}

class BootScene extends Phaser.Scene {
  constructor() { super('BootScene'); }
  create() {
    this.bakeBackgrounds();
    this.loadPortraits();
  }

  loadPortraits() {
    const keys = Object.keys(PORTRAITS);
    const toLoad = [];

    keys.forEach(key => {
      const data = PORTRAITS[key];
      if (!data) this.generateFallbackPortrait(key);
      else toLoad.push(key);
    });

    if (toLoad.length === 0) {
      this.scene.start('IntroScene');
      return;
    }

    let loaded = 0;
    toLoad.forEach(key => {
      this.textures.once('addtexture-' + key, () => {
        loaded++;
        if (loaded === toLoad.length) this.scene.start('IntroScene');
      });
      this.textures.addBase64(key, PORTRAITS[key]);
    });
  }

  generateFallbackPortrait(key) {
    const fallbackColors = {
      portrait_protagonist: { bg: 0x160a24, accent: C.ACCENT },
      portrait_scheduler:   { bg: 0x1f0d33, accent: 0x8c1aff },
      portrait_operator:    { bg: 0x170b26, accent: 0x9933ff },
      portrait_observer:    { bg: 0x12081f, accent: 0xa64dff },
      portrait_courier:     { bg: 0x1a0c2e, accent: 0xb366ff },
      portrait_drifter:     { bg: 0x140a24, accent: 0xbf80ff },
      portrait_mystery:     { bg: 0x1c0f2b, accent: 0xcc99ff }
    };
    const fc = fallbackColors[key] || { bg: 0x160a24, accent: C.ACCENT };
    const name = key.replace('portrait_', '').toUpperCase();
    const W = 160, H = 200;

    const rt = this.add.renderTexture(0, 0, W, H).setVisible(false);
    rt.fill(fc.bg);

    const g = this.add.graphics();
    g.lineStyle(2, fc.accent, 1);
    g.strokeRect(2, 2, W - 4, H - 4);
    if (key === 'portrait_protagonist') {
      g.fillStyle(0x0a030f, 1);
      g.fillEllipse(W / 2, 70, 60, 68);
      g.lineStyle(2, C.ACCENT, 0.6);
      g.strokeEllipse(W / 2, 70, 60, 68);
      g.fillStyle(0x0a030f, 1);
      g.beginPath();
      g.moveTo(20, H); g.lineTo(42, 120); g.lineTo(W - 42, 120); g.lineTo(W - 20, H);
      g.closePath(); g.fillPath();
      g.lineStyle(2, C.ACCENT, 0.6); g.strokePath();
      g.fillStyle(C.ACCENT, 0.6);
      g.fillCircle(64, 70, 2); g.fillCircle(96, 70, 2);
    } else {
      g.fillStyle(fc.accent, 0.2);
      g.fillCircle(W / 2, 60, 28);
      g.beginPath();
      g.moveTo(35, H); g.lineTo(50, 110); g.lineTo(W - 50, 110); g.lineTo(W - 35, H);
      g.closePath(); g.fillPath();
    }
    rt.draw(g);
    g.destroy();

    const txt = this.add.text(W / 2, H - 24, name, {
      fontFamily: F.UI, fontSize: '14px', fontStyle: '700',
      color: '#' + fc.accent.toString(16).padStart(6, '0'), letterSpacing: 2
    }).setOrigin(0.5);
    rt.draw(txt);
    txt.destroy();

    rt.saveTexture(key);
    rt.destroy();
  }

  mg() { return this.make.graphics({ add:false }); }

  bakeBackgrounds() {
    this.bakePlanetarium();
    this.bakeLabyrinth();
    this.bakeStation();
    this.bakeVoid();
  }

  // ---- PLANETARIUM LOUNGE
  bakePlanetarium() {
    const W = 960, H = 640;
    const g = this.mg();
    
    // Deep space background
    g.fillStyle(0x05020a, 1); g.fillRect(0, 0, W, H);
    
    // Stars
    g.fillStyle(0xe6ccff, 0.8);
    for(let i=0; i<150; i++) {
      g.fillCircle(Math.random()*W, Math.random()*H, Math.random()*1.5);
    }
    
    // Glowing lounge table
    g.fillStyle(0x1a0f2e, 1); g.fillEllipse(480, 500, 300, 100);
    g.lineStyle(2, C.ACCENT, 0.5); g.strokeEllipse(480, 500, 300, 100);
    g.fillStyle(0xb366ff, 0.1); g.fillEllipse(480, 500, 280, 80); // inner glow
    
    // Space suit stands
    // Empty stand left
    g.fillStyle(0x261645, 1); g.fillRect(280, 480, 60, 20);
    g.lineStyle(2, C.MUTE, 1); g.beginPath(); g.moveTo(310, 480); g.lineTo(310, 250); g.strokePath();
    // Stand with suit right
    g.fillStyle(0x261645, 1); g.fillRect(620, 480, 60, 20);
    g.lineStyle(2, C.MUTE, 1); g.beginPath(); g.moveTo(650, 480); g.lineTo(650, 250); g.strokePath();
    g.fillStyle(0x3d2b59, 1); g.fillEllipse(650, 320, 80, 160); // suit body
    g.fillStyle(0x1a0f2e, 1); g.fillCircle(650, 220, 35); // helmet
    g.lineStyle(2, C.ACCENT, 0.8); g.strokeCircle(650, 220, 35);

    g.generateTexture('bg_planetarium', W, H);
    g.destroy();
  }

  // ---- MIRROR LABYRINTH
  bakeLabyrinth() {
    const W = 960, H = 640;
    const g = this.mg();
    
    // Base floor
    g.fillStyle(0x0d0514, 1); g.fillRect(0, 0, W, H);
    
    // Grid floor
    g.lineStyle(1, 0x261645, 1);
    for(let x=0; x<W; x+=40) { g.beginPath(); g.moveTo(x, 400); g.lineTo(x-200, H); g.strokePath(); }
    for(let y=400; y<H; y+=25) { g.beginPath(); g.moveTo(0, y); g.lineTo(W, y); g.strokePath(); }

    // Mirror walls (angled trapezoids)
    g.fillStyle(0x1a0f2e, 1);
    g.beginPath(); g.moveTo(100, 0); g.lineTo(300, 150); g.lineTo(300, 450); g.lineTo(100, 550); g.fillPath();
    g.lineStyle(2, 0x661aff, 0.6); g.strokePath();
    
    g.beginPath(); g.moveTo(860, 0); g.lineTo(660, 150); g.lineTo(660, 450); g.lineTo(860, 550); g.fillPath();
    g.lineStyle(2, 0x661aff, 0.6); g.strokePath();
    
    // Reflections (cyan/purple diagonal streaks)
    g.lineStyle(4, 0x00f5d4, 0.2); g.beginPath(); g.moveTo(150, 50); g.lineTo(250, 400); g.strokePath();
    g.lineStyle(4, C.ACCENT, 0.2); g.beginPath(); g.moveTo(700, 100); g.lineTo(800, 450); g.strokePath();
    
    // Trail dots
    g.fillStyle(0xf0e6f5, 0.8);
    let px = 200, py = 580;
    for(let i=0; i<8; i++) {
      g.fillCircle(px, py, 4);
      px += 35; py -= 15;
    }
    
    // Trapdoor / Panel
    g.fillStyle(0x05020a, 1);
    g.beginPath(); g.moveTo(430, 480); g.lineTo(530, 480); g.lineTo(550, 520); g.lineTo(410, 520); g.fillPath();
    g.lineStyle(2, C.ACCENT, 1); g.strokePath();
    // Hole
    g.fillStyle(0x000000, 1); g.fillCircle(480, 500, 6);

    g.generateTexture('bg_labyrinth', W, H);
    g.destroy();
  }

  // ---- TV STATION
  bakeStation() {
    const W = 960, H = 640;
    const g = this.mg();
    
    // Dark room
    g.fillStyle(0x160a24, 1); g.fillRect(0, 0, W, 400);
    g.fillStyle(0x0d0514, 1); g.fillRect(0, 400, W, 240);

    // Big TV Screens
    g.fillStyle(0x05020a, 1); g.fillRect(150, 50, 660, 280);
    g.lineStyle(4, 0x261645, 1); g.strokeRect(150, 50, 660, 280);
    
    // Screen contents (static / recording)
    g.fillStyle(0x1a0f2e, 1); g.fillRect(160, 60, 640, 260);
    g.lineStyle(2, 0x3d2b59, 0.5);
    for(let y=60; y<320; y+=10) { g.beginPath(); g.moveTo(160, y); g.lineTo(800, y); g.strokePath(); }
    // LIVE dot
    g.fillStyle(0xff3366, 1); g.fillCircle(760, 90, 8);
    
    // Broadcasting Desk
    g.fillStyle(0x261645, 1); g.fillRect(200, 400, 560, 150);
    g.lineStyle(2, C.ACCENT, 0.7); g.strokeRect(200, 400, 560, 150);
    
    // Microphones
    g.lineStyle(4, 0x05020a, 1);
    g.beginPath(); g.moveTo(350, 450); g.lineTo(350, 400); g.strokePath(); g.fillStyle(0x3d2b59, 1); g.fillCircle(350, 390, 12);
    g.beginPath(); g.moveTo(610, 450); g.lineTo(610, 400); g.strokePath(); g.fillStyle(0x3d2b59, 1); g.fillCircle(610, 390, 12);

    g.generateTexture('bg_station', W, H);
    g.destroy();
  }

  // ---- VOID OF JUDGEMENT
  bakeVoid() {
    const W = 960, H = 640;
    const g = this.mg();
    
    // Abyss background
    g.fillStyle(0x05020a, 1); g.fillRect(0, 0, W, H);
    
    // Heavy metallic gates
    g.fillStyle(0x1a1a24, 1);
    g.fillRect(180, 50, 300, 450); // Left gate
    g.fillRect(480, 50, 300, 450); // Right gate
    g.lineStyle(4, 0x333345, 1);
    g.strokeRect(180, 50, 300, 450); g.strokeRect(480, 50, 300, 450);
    
    // Giant Saw Blade suspended
    g.fillStyle(0x404050, 1); g.fillCircle(480, 150, 80);
    g.lineStyle(4, 0x808090, 1);
    // Saw teeth
    for(let i=0; i<12; i++) {
      const angle = (i/12) * Math.PI * 2;
      const x1 = 480 + Math.cos(angle)*80; const y1 = 150 + Math.sin(angle)*80;
      const x2 = 480 + Math.cos(angle+0.2)*100; const y2 = 150 + Math.sin(angle+0.2)*100;
      g.beginPath(); g.moveTo(x1, y1); g.lineTo(x2, y2); g.strokePath();
    }
    // Saw ropes
    g.lineStyle(3, 0x3d2b59, 1);
    g.beginPath(); g.moveTo(480, 150); g.lineTo(480, 0); g.strokePath();

    // Floor panel
    g.fillStyle(0x1a0f2e, 1);
    g.beginPath(); g.moveTo(400, 500); g.lineTo(560, 500); g.lineTo(600, 550); g.lineTo(360, 550); g.fillPath();
    g.lineStyle(2, C.ACCENT, 1); g.strokePath();

    g.generateTexture('bg_void', W, H);
    g.destroy();
  }
}

      visitedRooms: [],
      suspectsTalked: [],
      pins: {},
      contradictionsTriggered: [],
      gamePhase: 'intro'
    }); this.registry.set('initialGameState', {
      currentRoom: 'planetarium',
      collectedEvidence: [],
      visitedRooms: [],
      suspectsTalked: [],
      pins: {},
      contradictionsTriggered: [],

    });

    this.cameras.main.setBackgroundColor('#0d0514');

    this.advancing = false;

      this.layer.add(this.add.rectangle(480, 290, 220, 2, C.ACCENT).setOrigin(0.5));
      this.layer.add(this.add.text(480, 340, 'A facility turned into a slaughterhouse.', { fontFamily: F.MONO, fontSize:'18px', color:C.MUTE_S }).setOrigin(0.5));
    }
    else if (idx === 1) {
      this.layer.add(this.add.text(480, 240, 'MULTIPLE VICTIMS.', { fontFamily: F.UI, fontSize:'46px', fontStyle:'700', color:C.LIGHT_S }).setOrigin(0.5));
      this.layer.add(this.add.rectangle(480, 285, 200, 2, C.ACCENT).setOrigin(0.5));
      const lines = [
        '> a stabbing in the lounge.',
        '> a trap in the mirror labyrinth.',
        '> ...and the void of judgement.'
      ];
      lines.forEach((t, i) => {
        this.layer.add(this.add.text(280, 320 + i*32, t, { fontFamily: F.MONO, fontSize:'18px', color: i === 2 ? C.ACCENT_S : C.LIGHT_S }));
      });
    }
    else if (idx === 2) {
      const port = this.add.image(220, 320, 'portrait_protagonist').setOrigin(0.5).setDisplaySize(160, 200);
      this.layer.add(port);
      this.layer.add(this.add.rectangle(220, 320, 162, 202, 0x000000, 0).setOrigin(0.5).setStrokeStyle(2, C.ACCENT));
      this.layer.add(drawAllCornerMarks(this, 139, 219, 162, 202, C.ACCENT, 12));

      this.layer.add(this.add.text(340, 220, 'My name does not matter right now.', { fontFamily: F.MONO, fontSize:'17px', color:C.LIGHT_S, fontStyle:'italic' }));
      this.layer.add(this.add.text(340, 270, 'The broadcast ordered us to search.', { fontFamily: F.MONO, fontSize:'17px', color:C.LIGHT_S, fontStyle:'italic' }));
      this.layer.add(this.add.text(340, 320, 'Someone pulled the strings of this night,', { fontFamily: F.MONO, fontSize:'17px', color:C.LIGHT_S, fontStyle:'italic' }));
      this.layer.add(this.add.text(340, 348, 'and orchestrated every death.', { fontFamily: F.MONO, fontSize:'17px', color:C.ACCENT_S, fontStyle:'italic' }));
    }
    else if (idx === 3) {
      this.layer.add(this.add.text(480, 240, 'LAST KNOWN LOCATION', { fontFamily: F.UI, fontSize:'30px', fontStyle:'700', color:C.MUTE_S, letterSpacing:4 }).setOrigin(0.5));
      this.layer.add(this.add.text(480, 290, 'PLANETARIUM LOUNGE.', { fontFamily: F.UI, fontSize:'56px', fontStyle:'700', color:C.ACCENT_S }).setOrigin(0.5));
      this.layer.add(this.add.rectangle(480, 330, 280, 2, C.ACCENT).setOrigin(0.5));
      this.layer.add(this.add.text(480, 370, 'That is where I start.', { fontFamily: F.MONO, fontSize:'18px', color:C.LIGHT_S, fontStyle:'italic' }).setOrigin(0.5));
    }
    else if (idx === 4) {
      this.layer.add(this.add.text(480, 200, 'MURDER NEXT DOOR', { fontFamily: F.UI, fontSize:'72px', fontStyle:'700', color:C.ACCENT_S, letterSpacing:6 }).setOrigin(0.5));
      this.layer.add(this.add.rectangle(480, 250, 360, 2, C.ACCENT).setOrigin(0.5));
      this.layer.add(this.add.text(480, 290, 'CASE FILE — THE VOID CASE', { fontFamily: F.MONO, fontSize:'15px', color:C.MUTE_S, letterSpacing:2 }).setOrigin(0.5));
      const btn = makeButton(this, 340, 380, 280, 56, '[ BEGIN INVESTIGATION ]', { fontSize: 18, onClick: () => { this.scene.start('GameScene'); } });
      this.layer.add(btn);
      this.lastPanel = true;
    }

    if (idx < 4) {
      const cont = this.add.text(px+pw-180, py+ph-30, '[ CLICK OR SPACE TO CONTINUE ▶ ]', { fontFamily: F.MONO, fontSize:'11px', color:C.ACCENT_S, letterSpacing:2 });
      this.layer.add(cont);
      this.tweens.add({ targets: cont, alpha: { from: 1, to: 0.35 }, duration: 700, yoyo:true, repeat:-1 });
    }
    this.cameras.main.fadeIn(300, 10, 10, 15);
  }

  advance() {
    if (this.advancing || this.lastPanel) return;
    this.advancing = true;
    this.cameras.main.fadeOut(220, 10, 10, 15);
    this.cameras.main.once('camerafadeoutcomplete', () => {
      this.panelIndex++;
      if (this.panelIndex > 4) { this.scene.start('GameScene'); return; }
      this.advancing = false;
      this.lastPanel = (this.panelIndex === 4);
      this.showPanel();
    });
  }
}

// =========================================================
// GAMESCENE
// =========================================================
class GameScene extends Phaser.Scene {
  constructor() { super('GameScene'); }

  create() {
    this.gs = this.registry.get('gameState');
    this.gs.gamePhase = 'investigation';
    if (!this.gs.visitedRooms.includes(this.gs.currentRoom)) this.gs.visitedRooms.push(this.gs.currentRoom);

    this.cameras.main.setBackgroundColor('#0d0514');

    this.bgLayer       = this.add.container(0, 0).setDepth(0);
    this.roomLayer     = this.add.container(0, 0).setDepth(10);
    this.uiBackLayer   = this.add.container(0, 0).setDepth(40);
    this.cardsLayer    = this.add.container(0, 0).setDepth(50);
    this.navLayer      = this.add.container(0, 0).setDepth(60);
    this.hintBtnLayer  = this.add.container(0, 0).setDepth(70);
    this.dialogueLayer = this.add.container(0, 0).setDepth(100).setVisible(false);
    this.suspectLayer  = this.add.container(0, 0).setDepth(200).setVisible(false);
    this.hintLayer     = this.add.container(0, 0).setDepth(300).setVisible(false);
    this.logsLayer     = this.add.container(0, 0).setDepth(400).setVisible(false);
    this.contraLayer   = this.add.container(0, 0).setDepth(500).setVisible(false);

    drawCanvasFrame(this);
    this.buildHeader();
    this.buildFilterButtons();
    this.buildEvidenceRow();
    this.cardsLayer.setVisible(false);
    this.buildNavBar();
    this.buildHintButton();
    this.buildDialoguePanel();

    this.loadRoom(this.gs.currentRoom);
    this.refreshEvidenceCards();
    this.refreshNavBar();

    this.input.keyboard.on('keydown-SPACE', () => { if (this.dialogueActive) this.advanceDialogue(); });
    this.input.keyboard.on('keydown-ESC', () => {
      if (this.suspectLayer.visible) this.toggleSuspectBoard(false);
      else if (this.hintLayer.visible) this.toggleHintPanel(false);
      else if (this.logsLayer.visible) this.toggleLogs(false);
    });
  }

  buildHeader() {
    const h = 38;
    const bg = this.add.rectangle(0, 0, 960, h, C.BG_PANEL, 1).setOrigin(0,0);
    const line = this.add.rectangle(0, h, 960, 1, C.ACCENT).setOrigin(0,0);
    this.uiBackLayer.add([bg, line]);
    this.headerLabel = this.add.text(20, 12, '', { fontFamily: F.UI, fontSize:'15px', fontStyle:'700', color:C.ACCENT_S, letterSpacing:4 });
    this.headerSub = this.add.text(20, 28, '', { fontFamily: F.MONO, fontSize:'9px', color:C.MUTE_S, letterSpacing:2 });
    this.headerStatus = this.add.text(940, 14, '', { fontFamily: F.MONO, fontSize:'11px', color:C.MUTE_S, letterSpacing:2 }).setOrigin(1, 0);
    this.uiBackLayer.add([this.headerLabel, this.headerSub, this.headerStatus]);
  }

  refreshHeader() {
    const room = this.gs.currentRoom;
    this.headerLabel.setText(`// ${ROOM_NAMES[room]}`);
    this.headerSub.setText(`zone ${ROOM_KEYS.indexOf(room)+1} / 04   ·   void case investigation`);
    const ev = this.gs.collectedEvidence.length;
    const cn = this.gs.contradictionsTriggered.length;
    this.headerStatus.setText(`EVIDENCE ${String(ev).padStart(2,'0')}/16   ·   CONTRADICTIONS ${cn}/05`);
  }

  loadRoom(room) {
    this.gs.currentRoom = room;
    if (!this.gs.visitedRooms.includes(room)) this.gs.visitedRooms.push(room);

    this.bgLayer.removeAll(true);
    this.roomLayer.removeAll(true);

    const bg = this.add.image(480, 320, 'bg_' + room);
    this.bgLayer.add(bg);

    const dim = this.add.rectangle(0, 360, 960, 280, 0x000000, 0.18).setOrigin(0,0);
    this.bgLayer.add(dim);

    HOTSPOTS[room].forEach(h => this.makeHotspot(h));
    (NPCS[room] || []).forEach(n => this.makeNPC(n));

    this.refreshHeader();
    this.refreshNavBar();

    this.cameras.main.flash(180, 179, 102, 255); // Purple flash
  }

  makeHotspot(h) {
    const collected = h.collect && this.gs.collectedEvidence.includes(h.collect);
    const cont = this.add.container(h.x, h.y);
    cont.hsId = h.id;

    const br = this.add.graphics();
    br.lineStyle(1.5, C.ACCENT, 1);
    const r = 22;
    [[-r,-r,1,1],[r,-r,-1,1],[-r,r,1,-1],[r,r,-1,-1]].forEach(([x,y,sx,sy]) => {
      br.beginPath(); br.moveTo(x, y); br.lineTo(x + 8*sx, y); br.moveTo(x, y); br.lineTo(x, y + 8*sy); br.strokePath();
    });
    cont.add(br);

    const dia = this.add.graphics();
    if (collected) { dia.fillStyle(C.ACCENT_D, 0.7); dia.lineStyle(1.5, C.ACCENT, 0.7); } 
    else { dia.fillStyle(C.ACCENT, 1); dia.lineStyle(1.5, C.LIGHT, 1); }
    dia.beginPath(); dia.moveTo(0, -8); dia.lineTo(8, 0); dia.lineTo(0, 8); dia.lineTo(-8, 0); dia.closePath(); dia.fillPath(); dia.strokePath();
    cont.add(dia);

    const lbl = this.add.text(0, 28, h.label, { fontFamily: F.MONO, fontSize:'10px', color:C.ACCENT_S, letterSpacing:1.5 }).setOrigin(0.5).setAlpha(0);
    cont.add(lbl);

    const hit = this.add.rectangle(0, 0, 56, 56, 0x000000, 0).setInteractive({ useHandCursor:true });
    cont.add(hit);

    hit.on('pointerover', () => { lbl.setAlpha(1); this.tweens.add({ targets: dia, scale:1.4, duration:120 }); });
    hit.on('pointerout', () => { lbl.setAlpha(0); this.tweens.add({ targets: dia, scale:1.0, duration:120 }); });
    hit.on('pointerdown', () => this.triggerHotspot(h));

    this.tweens.add({ targets: [dia, br], alpha:{ from:0.6, to:1.0 }, duration:900, yoyo:true, repeat:-1 });
    this.roomLayer.add(cont);
  }

  makeNPC(n) {
    const cont = this.add.container(n.x, n.y);
    const sh = this.add.ellipse(0, 70, 70, 14, 0x000000, 0.5);
    cont.add(sh);
    const body = this.add.graphics();
    body.fillStyle(n.color, 1);
    body.beginPath(); body.moveTo(-22, 60); body.lineTo(-14, 0); body.lineTo(14, 0); body.lineTo(22, 60); body.closePath(); body.fillPath();
    body.lineStyle(2, 0x0d0514, 1); body.strokePath();
    cont.add(body);
    const head = this.add.circle(0, -14, 14, 0xd4cfe0).setStrokeStyle(2, 0x0d0514);
    cont.add(head);
    const nameBg = this.add.rectangle(0, -50, 80, 18, C.BG_PANEL, 0.92).setStrokeStyle(1, C.ACCENT);
    const nameTxt = this.add.text(0, -50, n.name, { fontFamily: F.UI, fontSize:'11px', fontStyle:'700', color:C.ACCENT_S, letterSpacing:2 }).setOrigin(0.5);
    cont.add([nameBg, nameTxt]);
    const dot = this.add.circle(34, -36, 4, C.ACCENT);
    cont.add(dot);
    this.tweens.add({ targets: dot, alpha:{from:0.4,to:1}, duration:700, yoyo:true, repeat:-1 });

    const hit = this.add.rectangle(0, 20, 80, 100, 0x000000, 0).setInteractive({ useHandCursor:true });
    cont.add(hit);
    hit.on('pointerover', () => { this.tweens.add({ targets: cont, y: n.y - 4, duration: 140 }); });
    hit.on('pointerout', () => { this.tweens.add({ targets: cont, y: n.y, duration: 140 }); });
    hit.on('pointerdown', () => this.triggerNPC(n));

    this.roomLayer.add(cont);
  }

  buildFilterButtons() {
    this.filter = 'ALL';
    const labels = ['ALL', 'PHYSICAL', 'TESTIMONY', 'DOCUMENT'];
    this.filterBtns = {};
    let x = 14;
    labels.forEach(l => {
      const w = (l === 'ALL') ? 60 : 100;
      const btn = this.add.container(x, 50);
      const bg = this.add.rectangle(0, 0, w, 22, C.BG_PANEL, 1).setOrigin(0,0).setStrokeStyle(1, C.MUTE);
      const txt = this.add.text(w/2, 11, l, { fontFamily: F.UI, fontSize:'11px', fontStyle:'700', color:C.MUTE_S, letterSpacing:2 }).setOrigin(0.5);
      btn.add([bg, txt]);
      bg.setInteractive({ useHandCursor:true });
      bg.on('pointerover', () => { if (this.filter !== l) bg.setStrokeStyle(1, C.ACCENT); });
      bg.on('pointerout',  () => { if (this.filter !== l) bg.setStrokeStyle(1, C.MUTE); });
      bg.on('pointerdown', () => { this.filter = l; this.refreshEvidenceCards(); });
      this.filterBtns[l] = { bg, txt };
      this.cardsLayer.add(btn);
      x += w + 6;
    });
    const _evLbl = this.add.text(580, 56, '// EVIDENCE LOCKER [+]', { fontFamily: F.MONO, fontSize:'10px', color:C.ACCENT_S, letterSpacing:2 }).setOrigin(0,0).setDepth(60);_evLbl.setInteractive({ useHandCursor:true });_evLbl.on('pointerdown', () => { const v = this.cardsLayer.visible; this.cardsLayer.setVisible(!v); _evLbl.setText('// EVIDENCE LOCKER ' + (v ? '[+]' : '[-]')); });
    this.evCount = this.add.text(940, 56, '00 / 16', { fontFamily: F.MONO, fontSize:'10px', color:C.ACCENT_S, letterSpacing:2 }).setOrigin(1,0).setDepth(50);
    this.cardsLayer.add(this.evCount);
  }

  buildEvidenceRow() {
    const stripY = 80;
    const stripBg = this.add.rectangle(10, stripY, 940, 70, C.BG_PANEL, 1).setOrigin(0,0).setStrokeStyle(1, 0x261645);
    const stripTop = this.add.rectangle(10, stripY, 940, 1, C.ACCENT, 0.5).setOrigin(0,0);
    this.cardsLayer.add([stripBg, stripTop]);

    this.cardScroll = 0;
    const leftBtn = this.add.container(10, stripY+22);
    const lbg = this.add.rectangle(0, 0, 22, 26, C.BG_PANEL, 1).setOrigin(0,0).setStrokeStyle(1, C.ACCENT);
    const ltx = this.add.text(11, 13, '◀', { fontFamily:F.MONO, fontSize:'12px', color:C.ACCENT_S }).setOrigin(0.5);
    leftBtn.add([lbg, ltx]);
    lbg.setInteractive({ useHandCursor:true });
    lbg.on('pointerdown', () => { this.cardScroll = Math.max(0, this.cardScroll - 1); this.refreshEvidenceCards(); });
    lbg.on('pointerover', () => { lbg.setFillStyle(C.ACCENT); ltx.setColor(C.BG_DEEP_S); });
    lbg.on('pointerout',  () => { lbg.setFillStyle(C.BG_PANEL); ltx.setColor(C.ACCENT_S); });
    this.cardsLayer.add(leftBtn);

    const rightBtn = this.add.container(928, stripY+22);
    const rbg = this.add.rectangle(0, 0, 22, 26, C.BG_PANEL, 1).setOrigin(0,0).setStrokeStyle(1, C.ACCENT);
    const rtx = this.add.text(11, 13, '▶', { fontFamily:F.MONO, fontSize:'12px', color:C.ACCENT_S }).setOrigin(0.5);
    rightBtn.add([rbg, rtx]);
    rbg.setInteractive({ useHandCursor:true });
    rbg.on('pointerdown', () => { this.cardScroll = this.cardScroll + 1; this.refreshEvidenceCards(); });
    rbg.on('pointerover', () => { rbg.setFillStyle(C.ACCENT); rtx.setColor(C.BG_DEEP_S); });
    rbg.on('pointerout',  () => { rbg.setFillStyle(C.BG_PANEL); rtx.setColor(C.ACCENT_S); });
    this.cardsLayer.add(rightBtn);

    this.emptyText = this.add.text(480, stripY+34, '// NO EVIDENCE COLLECTED · INTERACT WITH HOTSPOTS', { fontFamily: F.MONO, fontSize:'11px', color:C.MUTE_S, letterSpacing:2 }).setOrigin(0.5);
    this.cardsLayer.add(this.emptyText);
    this.cardsHolder = this.add.container(38, stripY+5);
    this.cardsLayer.add(this.cardsHolder);
  }

  refreshEvidenceCards() {
    Object.keys(this.filterBtns).forEach(k => {
      const o = this.filterBtns[k];
      if (k === this.filter) { o.bg.setFillStyle(C.ACCENT, 1).setStrokeStyle(1, C.ACCENT); o.txt.setColor(C.BG_DEEP_S); } 
      else { o.bg.setFillStyle(C.BG_PANEL, 1).setStrokeStyle(1, C.MUTE); o.txt.setColor(C.MUTE_S); }
    });

    const evs = this.gs.collectedEvidence.filter(id => {
      if (this.filter === 'ALL') return true;
      return EVIDENCE_META[id] && EVIDENCE_META[id].type === this.filter;
    });

    this.evCount.setText(`${String(this.gs.collectedEvidence.length).padStart(2,'0')} / 16`);
    this.emptyText.setVisible(evs.length === 0);
    this.cardsHolder.removeAll(true);

    const cardW = 138, cardH = 60, gap = 8;
    const visible = 6;
    const maxScroll = Math.max(0, evs.length - visible);
    if (this.cardScroll > maxScroll) this.cardScroll = maxScroll;

    for (let i = 0; i < visible; i++) {
      const idx = i + this.cardScroll;
      if (idx >= evs.length) break;
      const id = evs[idx];
      const meta = EVIDENCE_META[id];
      const x = i * (cardW + gap);

      const card = this.add.container(x, 0);
      const bg = this.add.rectangle(0, 0, cardW, cardH, C.BG_PANEL2, 1).setOrigin(0,0).setStrokeStyle(1, C.MUTE);
      const stripe = this.add.rectangle(0, 0, 3, cardH, C.ACCENT, 1).setOrigin(0,0);
      const tagColor = meta.type === 'PHYSICAL' ? C.ACCENT : (meta.type === 'TESTIMONY' ? 0xc49a2a : 0x8aa6c8);
      const tagBg = this.add.rectangle(cardW-50, 6, 44, 12, 0x000000, 0).setOrigin(0,0).setStrokeStyle(1, tagColor);
      const tagTx = this.add.text(cardW-28, 12, meta.type.slice(0,3), { fontFamily: F.MONO, fontSize:'8px', color:'#'+tagColor.toString(16).padStart(6,'0'), letterSpacing:1 }).setOrigin(0.5);
      const title = this.add.text(10, 14, id.length > 18 ? id.slice(0,17)+'…' : id, { fontFamily: F.UI, fontSize:'12px', fontStyle:'700', color:C.LIGHT_S, letterSpacing:1 });
      const room = this.add.text(10, 30, '> ' + meta.room, { fontFamily: F.MONO, fontSize:'9px', color:C.MUTE_S, letterSpacing:1 });
      const bottomBar = this.add.rectangle(10, cardH-15, cardW-20, 1, 0x261645).setOrigin(0,0);
      const bottomTag = this.add.text(10, cardH-12, '· COLLECTED', { fontFamily: F.MONO, fontSize:'8px', color:C.ACCENT_S, letterSpacing:1 });

      card.add([bg, stripe, tagBg, tagTx, title, room, bottomBar, bottomTag]);
      bg.setInteractive({ useHandCursor: true });
      bg.on('pointerdown', () => window.openEvidenceModal('void', id));
    
      if (id === this._newestEvidence) {
        card.setScale(0.6); card.setAlpha(0);
        this.tweens.add({ targets: card, scale:1, alpha:1, duration:380, ease:'Back.Out' });
      }
      this.cardsHolder.add(card);
    }
    this._newestEvidence = null;
    this.refreshHeader();
  }

    sBg.on('pointerout',  () => { sBg.setFillStyle(C.BG_PANEL); sTx.setColor(C.ACCENT_S); });

    this.accuseCont.add([aBg, aTx]);
    aBg.setInteractive({ useHandCursor:true });
    aBg.on('pointerover', () => { aBg.setFillStyle(C.ACCENT); aTx.setColor(C.BG_DEEP_S); });
    aBg.on('pointerout',  () => { aBg.setFillStyle(C.BG_PANEL); aTx.setColor(C.ACCENT_S); });
    aBg.on('pointerdown', () => { if (this.dialogueActive) return; if (this.gs.visitedRooms.length < 4) return; this.scene.start('AccusationScene'); });
    this.accuseCont.setVisible(false);
    this.navLayer.add(this.accuseCont);
    
    this.accuseEmpty = this.add.rectangle(ax, navY+2, 350, navH-2, C.BG_PANEL, 1).setOrigin(0,0);
    const aeTx = this.add.text(ax + 175, navY + navH/2 + 2, '// ACCUSATION LOCKED — VISIT ALL ROOMS', { fontFamily: F.MONO, fontSize:'10px', color:C.MUTE_S, letterSpacing:2 }).setOrigin(0.5);

    this.accuseEmptyTxt = aeTx;
  }

  refreshNavBar() {
    Object.keys(this.navTabs).forEach(k => {
      const o = this.navTabs[k];
      const isCurrent = (this.gs.currentRoom === k);
      const visited = this.gs.visitedRooms.includes(k);
      if (isCurrent) { o.bg.setFillStyle(C.ACCENT, 1).setStrokeStyle(1, C.ACCENT); o.txt.setColor(C.BG_DEEP_S); } 
      else { o.bg.setFillStyle(C.BG_PANEL, 1).setStrokeStyle(1, 0x261645); o.txt.setColor(visited ? C.LIGHT_S : C.MUTE_S); }
      o.dot.setVisible(visited && !isCurrent);
    });
    const ready = this.gs.visitedRooms.length >= 4;
    this.accuseCont.setVisible(ready);
    this.accuseEmpty.setVisible(!ready);
    this.accuseEmptyTxt.setVisible(!ready);
  }

  transitionToRoom(room) {
    this.cameras.main.fadeOut(180, 10, 10, 15);
    this.cameras.main.once('camerafadeoutcomplete', () => {
      this.loadRoom(room);
      this.cameras.main.fadeIn(220, 10, 10, 15);
    });
  }

  showDialogue(lines, onDone) {
    this.dialogueActive = true;
    this.dialogueQueue = lines.slice();
    this._dialogueOnDone = onDone || null;
    this.dialogueLayer.setVisible(true);
    this.dialogueLayer.setAlpha(0);
    this.dialogueLayer.y = 8;
    this.tweens.add({ targets: this.dialogueLayer, alpha: 1, y: 0, duration: 200 });
    this.advanceDialogue(true);
  }

  advanceDialogue(initial) {
    if (!this.dialogueActive) return;
    if (!initial) { if (this.dialogueQueue.length === 0) { this.hideDialogue(); return; } }
    const next = this.dialogueQueue.shift();
    if (!next) { this.hideDialogue(); return; }
    this.dPortrait.setTexture(next.portrait);
    this.dSpeaker.setText('// ' + (next.speaker || '— — —'));
    this.dFileTag.setText('// LOG ENTRY · MIXED CASE');
    this.dText.setStyle({ fontFamily: F.MONO, fontSize:'18px', color: C.LIGHT_S, fontStyle: next.italic ? 'italic' : '500', wordWrap:{ width: 720, useAdvancedWrap:true }, align:'left', lineSpacing:6 });
    this.dText.setText(next.text);
    this.dText.setAlpha(0);
    this.tweens.add({ targets: this.dText, alpha: 1, duration: 130 });
  }

  hideDialogue() {
    this.dialogueActive = false;
    this.tweens.add({
      targets: this.dialogueLayer, alpha: 0, duration: 140,
      onComplete: () => {
        this.dialogueLayer.setVisible(false);
        const done = this._dialogueOnDone;
        this._dialogueOnDone = null;
        if (done) done();
      }
    });
  }

  triggerHotspot(h) {
    if (this.dialogueActive) return;
    this.showDialogue(h.lines, () => {
      if (h.collect) {
        if (h.collectExtra && this.gs.collectedEvidence.includes(h.collect)) {
          this.showDialogue([P(h.collectExtra)]); return;
        }
        this.collectEvidence(h.collect);
      }
      if (h.after === 'logs_panel') {
        this.toggleLogs(true); return;
      }
      this.checkContradictions();
    });
  }

  triggerNPC(n) {
    if (this.dialogueActive) return;
    if (!this.gs.suspectsTalked.includes(n.id)) this.gs.suspectsTalked.push(n.id);
    let queue = n.lines.slice();
    if (n.conditional && this.gs.collectedEvidence.includes(n.conditional.has)) { queue.push(n.conditional.line); }
    this.showDialogue(queue, () => {
      if (n.collect) this.collectEvidence(n.collect);
      this.checkContradictions();
    });
  }

  collectEvidence(id) {
    if (!id || this.gs.collectedEvidence.includes(id)) return false;
    this.gs.collectedEvidence.push(id);
    this._newestEvidence = id;
    this.filter = 'ALL';
    this.cardScroll = Math.max(0, this.gs.collectedEvidence.length - 6);
    this.refreshEvidenceCards();
    this.cameras.main.flash(120, 179, 102, 255);
    this.refreshHotspots();
    return true;
  }

  refreshHotspots() {
    this.roomLayer.removeAll(true);
    HOTSPOTS[this.gs.currentRoom].forEach(h => this.makeHotspot(h));
    (NPCS[this.gs.currentRoom] || []).forEach(n => this.makeNPC(n));
  }

  checkContradictions() {
    for (const c of CONTRADICTIONS) {
      if (this.gs.contradictionsTriggered.includes(c.id)) continue;
      const ok = c.requires.every(req => this.gs.collectedEvidence.includes(req));
      if (ok) { this.fireContradiction(c.id); return; }
    }
  }

  fireContradiction(id) {
    const c = CONTRADICTIONS.find(x => x.id === id);
    if (!c) return;
    if (this.gs.contradictionsTriggered.includes(id)) return;
    this.gs.contradictionsTriggered.push(id);
    this.refreshHeader();

    const layer = this.contraLayer;
    layer.removeAll(true);
    layer.setVisible(true).setAlpha(0);

    const overlay = this.add.rectangle(0, 0, 960, 640, 0x0d0514, 0.92).setOrigin(0,0);
    layer.add(overlay);

    const big = this.add.text(480, 230, 'CONTRADICTION', { fontFamily: F.UI, fontSize:'72px', fontStyle:'700', color:C.ACCENT_S, letterSpacing:8 }).setOrigin(0.5);
    layer.add(big);
    const tw = big.width + 80, th = big.height + 30;
    const border = this.add.rectangle(480, 230, tw, th, 0x000000, 0).setOrigin(0.5).setStrokeStyle(3, C.ACCENT);
    layer.add(border);
    layer.add(drawAllCornerMarks(this, 480-tw/2, 230-th/2, tw, th, C.ACCENT, 22));
    
    const idx = this.add.text(480, 290, `// CONTRADICTION 0${id} OF 05 LOGGED`, { fontFamily: F.MONO, fontSize:'12px', color:C.MUTE_S, letterSpacing:4 }).setOrigin(0.5);
    layer.add(idx);
    const expl = this.add.text(480, 360, c.text, { fontFamily: F.MONO, fontSize:'18px', color:C.LIGHT_S, fontStyle:'italic', wordWrap:{ width: 720, useAdvancedWrap:true }, align:'center', lineSpacing:6 }).setOrigin(0.5);
    layer.add(expl);

    this.tweens.add({
      targets: layer, alpha: 1, duration: 300,
      onComplete: () => {
        this.time.delayedCall(1800, () => {
          this.tweens.add({
            targets: layer, alpha: 0, duration: 400,
            onComplete: () => { layer.setVisible(false); layer.removeAll(true); }
          });
        });
      }
    });
  }

  toggleSuspectBoard(show) {
    if (show) {
      this.buildSuspectBoard();
      this.suspectLayer.setVisible(true).setAlpha(0);
      this.tweens.add({ targets: this.suspectLayer, alpha: 1, duration: 180 });
    } else {
      this.tweens.add({
        targets: this.suspectLayer, alpha: 0, duration: 180,
        onComplete: () => { this.suspectLayer.setVisible(false); this.suspectLayer.removeAll(true); }
      });
    }
  }

  buildSuspectBoard() {
    const layer = this.suspectLayer;
    layer.removeAll(true);
    const back = this.add.rectangle(0, 0, 960, 640, 0x0d0514, 0.97).setOrigin(0,0);
    layer.add(back);
    const grid = this.add.graphics();
    grid.lineStyle(1, 0x261645, 1);
    for (let gx = 0; gx <= 960; gx += 40) { grid.beginPath(); grid.moveTo(gx, 0); grid.lineTo(gx, 640); grid.strokePath(); }
    for (let gy = 0; gy <= 640; gy += 40) { grid.beginPath(); grid.moveTo(0, gy); grid.lineTo(960, gy); grid.strokePath(); }
    layer.add(grid);

    const headerBg = this.add.rectangle(0, 0, 960, 56, C.BG_PANEL, 1).setOrigin(0,0);
    const headerLine = this.add.rectangle(0, 56, 960, 2, C.ACCENT).setOrigin(0,0);
    layer.add([headerBg, headerLine]);
    layer.add(this.add.text(20, 16, '// SUSPECT BOARD', { fontFamily: F.UI, fontSize:'18px', fontStyle:'700', color:C.ACCENT_S, letterSpacing:5 }));
    layer.add(this.add.text(20, 38, 'cross-reference suspects against evidence · pin items to build a case', { fontFamily: F.MONO, fontSize:'10px', color:C.MUTE_S, letterSpacing:1 }));
    const closeBtn = makeButton(this, 880, 14, 60, 28, '× ESC', { fontSize:11, onClick: () => this.toggleSuspectBoard(false) });
    layer.add(closeBtn);

    const cardW = 175, cardH = 410, gap = 10;
    const totalW = 5 * cardW + 4 * gap;
    const startX = (960 - totalW) / 2;
    const cardY = 90;

    SUSPECTS.forEach((sus, i) => {
      const x = startX + i * (cardW + gap);
      const card = this.add.container(x, cardY);
      const bg = this.add.rectangle(0, 0, cardW, cardH, C.BG_PANEL, 1).setOrigin(0,0).setStrokeStyle(1, 0x261645);
      card.add(bg);
      card.add(this.add.rectangle(0, 0, cardW, 4, C.ACCENT, 1).setOrigin(0,0));
      card.add(this.add.text(10, 14, '0' + (i+1), { fontFamily: F.MONO, fontSize:'10px', color:C.MUTE_S, letterSpacing:2 }));
      card.add(this.add.text(cardW-10, 14, '·', { fontFamily: F.MONO, fontSize:'10px', color:C.ACCENT_S }).setOrigin(1,0));
      const port = this.add.image(cardW/2, 130, sus.portrait).setOrigin(0.5).setDisplaySize(150, 188);
      card.add(port);
      const portBorder = this.add.rectangle(cardW/2, 130, 152, 190, 0x000000, 0).setOrigin(0.5).setStrokeStyle(1, C.ACCENT, 0.7);
      card.add(portBorder);
      card.add(this.add.text(cardW/2, 240, sus.name, { fontFamily: F.UI, fontSize:'22px', fontStyle:'700', color:C.LIGHT_S, letterSpacing:4 }).setOrigin(0.5));
      card.add(this.add.rectangle(20, 268, cardW-40, 1, C.ACCENT, 0.4).setOrigin(0,0));
      card.add(this.add.text(cardW/2, 290, sus.desc, { fontFamily: F.MONO, fontSize:'11px', color:C.MUTE_S, wordWrap:{ width: cardW - 24, useAdvancedWrap: true }, align:'center', lineSpacing:3 }).setOrigin(0.5));

      const pins = this.gs.pins[sus.id] || [];
      const pinsContainer = this.add.container(8, 330);
      let py = 0;
      pins.slice(0, 3).forEach(p => {
        const tagW = cardW - 16;
        const tagBg = this.add.rectangle(0, py, tagW, 20, 0x000000, 0).setOrigin(0,0).setStrokeStyle(1, C.ACCENT);
        const tagTx = this.add.text(8, py + 10, '· ' + (p.length > 22 ? p.slice(0,21)+'…' : p), { fontFamily: F.MONO, fontSize:'10px', color:C.ACCENT_S, letterSpacing:1 }).setOrigin(0,0.5);
        pinsContainer.add([tagBg, tagTx]);
        py += 24;
      });
      if (pins.length > 3) { pinsContainer.add(this.add.text(0, py, `+${pins.length - 3} more`, { fontFamily: F.MONO, fontSize:'9px', color:C.MUTE_S })); }
      card.add(pinsContainer);

      const pinBtn = makeButton(this, 14, cardH - 38, cardW - 28, 26, '+ PIN EVIDENCE', { fontSize: 11, onClick: () => this.openPinPicker(sus) });
      card.add(pinBtn);
      layer.add(card);
    });
  }

  openPinPicker(sus) {
    const layer = this.suspectLayer;
    const sub = this.add.container(0, 0);
    const back = this.add.rectangle(0, 0, 960, 640, 0x000000, 0.7).setOrigin(0,0).setInteractive();
    sub.add(back);
    const pw = 520, ph = 440;
    const px = (960-pw)/2, py = (640-ph)/2;
    const pBg = this.add.rectangle(px, py, pw, ph, C.BG_PANEL, 1).setOrigin(0,0).setStrokeStyle(2, C.ACCENT);
    sub.add(pBg);
    sub.add(drawAllCornerMarks(this, px, py, pw, ph, C.ACCENT, 16));
    sub.add(this.add.rectangle(px+16, py+16, pw-32, 1, C.ACCENT).setOrigin(0,0));
    sub.add(this.add.text(px+16, py+22, `// PIN EVIDENCE TO ${sus.name}`, { fontFamily: F.UI, fontSize:'15px', fontStyle:'700', color:C.ACCENT_S, letterSpacing:4 }));
    sub.add(this.add.text(px+pw-16, py+24, 'click an item to toggle pin', { fontFamily: F.MONO, fontSize:'10px', color:C.MUTE_S }).setOrigin(1,0));

    const pins = this.gs.pins[sus.id] || (this.gs.pins[sus.id] = []);
    const list = this.gs.collectedEvidence;

    if (list.length === 0) {
      sub.add(this.add.text(px+pw/2, py+ph/2, '> NO EVIDENCE COLLECTED YET', { fontFamily: F.MONO, fontSize:'14px', color:C.MUTE_S }).setOrigin(0.5));
    }

    list.forEach((id, i) => {
      const col = i % 2;
      const row = Math.floor(i / 2);
      const ix = px + 20 + col * 240;
      const iy = py + 60 + row * 36;
      const isPinned = pins.includes(id);
      const meta = EVIDENCE_META[id];
      const itemBg = this.add.rectangle(ix, iy, 230, 30, C.BG_PANEL2, 1).setOrigin(0,0).setStrokeStyle(1, isPinned ? C.ACCENT : 0x261645);

      itemBg.on('pointerdown', () => {
        if (pins.includes(id)) pins.splice(pins.indexOf(id), 1); else pins.push(id);

        this.toggleSuspectBoard(false); this.toggleSuspectBoard(true);
      });
      itemBg.on('pointerover', () => itemBg.setStrokeStyle(1, C.ACCENT));
      itemBg.on('pointerout',  () => itemBg.setStrokeStyle(1, isPinned ? C.ACCENT : 0x261645));
      sub.add([itemBg, stripe, tx, tag]);
    });

    const closeBtn = makeButton(this, px+pw-110, py+ph-44, 92, 28, 'DONE', { fontSize:12, onClick: () => sub.destroy() });

class AccusationScene extends Phaser.Scene {
  constructor() { super('AccusationScene'); }

  create() {
    this.gs = this.registry.get('gameState');
    this.gs.gamePhase = 'accusation';
    this.cameras.main.setBackgroundColor('#0d0514');

    const grid = this.add.graphics();
    grid.lineStyle(1, 0x261645, 1);
    for (let x = 0; x <= 960; x += 40) { grid.beginPath(); grid.moveTo(x,0); grid.lineTo(x,640); grid.strokePath(); }
    for (let y = 0; y <= 640; y += 40) { grid.beginPath(); grid.moveTo(0,y); grid.lineTo(960,y); grid.strokePath(); }
    const diag = this.add.graphics();
    diag.lineStyle(1, C.ACCENT, 0.3);
    diag.beginPath(); diag.moveTo(0, 80); diag.lineTo(80, 0); diag.strokePath();
    diag.beginPath(); diag.moveTo(960, 80); diag.lineTo(880, 0); diag.strokePath();

    drawCanvasFrame(this);

    this.add.rectangle(0, 0, 960, 56, C.BG_PANEL, 1).setOrigin(0,0);
    this.add.rectangle(0, 56, 960, 2, C.ACCENT).setOrigin(0,0);
    this.add.text(20, 18, '// FINAL ACCUSATION', { fontFamily: F.UI, fontSize:'18px', fontStyle:'700', color:C.ACCENT_S, letterSpacing:5 });
    
    this.add.text(940, 18, '// CASE: THE VOID CASE · CLOSE THE LOOP', { fontFamily: F.MONO, fontSize:'10px', color:C.MUTE_S, letterSpacing:2 }).setOrigin(1,0);

    this.add.text(480, 110, 'WHO IS THE MASTERMIND?', { fontFamily: F.UI, fontSize:'42px', fontStyle:'700', color:C.LIGHT_S, letterSpacing:6 }).setOrigin(0.5);
    this.add.rectangle(480, 142, 380, 3, C.ACCENT).setOrigin(0.5);
    this.add.text(480, 168, 'select one. there is no second guess.', { fontFamily: F.MONO, fontSize:'13px', color:C.MUTE_S, letterSpacing:2, fontStyle:'italic' }).setOrigin(0.5);

    const cardW = 160, cardH = 280, gap = 20;
    const totalW = 5*cardW + 4*gap;
    const startX = (960 - totalW) / 2;
    const y = 220;

    [...SUSPECTS].sort(()=>Math.random()-0.5).forEach((sus, i) => {
      const x = startX + i*(cardW+gap);
      const card = this.add.container(x, y);
      const bg = this.add.rectangle(0, 0, cardW, cardH, C.BG_PANEL, 1).setOrigin(0,0).setStrokeStyle(2, C.MUTE);
      const portBg = this.add.rectangle(8, 8, cardW-16, 200, 0x000000, 0).setOrigin(0,0).setStrokeStyle(1, C.ACCENT, 0.7);
      const port = this.add.image(cardW/2, 108, sus.portrait).setOrigin(0.5).setDisplaySize(cardW-20, 196);
      const numTag = this.add.text(14, 18, '0' + (i+1), { fontFamily: F.MONO, fontSize:'11px', color:C.ACCENT_S, letterSpacing:2 });
      const name = this.add.text(cardW/2, 226, sus.name, { fontFamily: F.UI, fontSize:'22px', fontStyle:'700', color:C.LIGHT_S, letterSpacing:5 }).setOrigin(0.5);
      const div = this.add.rectangle(cardW/2, 248, 60, 1, C.ACCENT).setOrigin(0.5);
      const action = this.add.text(cardW/2, 264, '> ACCUSE', { fontFamily: F.MONO, fontSize:'11px', color:C.ACCENT_S, letterSpacing:3 }).setOrigin(0.5);
      const corners = drawAllCornerMarks(this, x+4, y+4, cardW-8, cardH-8, C.ACCENT, 14);
      corners.setAlpha(0);

      card.add([bg, portBg, port, numTag, name, div, action]);
      bg.setInteractive({ useHandCursor:true });
      bg.on('pointerover', () => {
        bg.setStrokeStyle(2, C.ACCENT); action.setColor(C.ACCENT_S); corners.setAlpha(1);
        this.tweens.add({ targets: card, scaleX:1.05, scaleY:1.05, x: x - cardW*0.025, y: y - cardH*0.025, duration:140 });
      });
      bg.on('pointerout', () => {
        bg.setStrokeStyle(2, C.MUTE); action.setColor(C.ACCENT_S); corners.setAlpha(0);
        this.tweens.add({ targets: card, scaleX:1, scaleY:1, x, y, duration:140 });
      });
      bg.on('pointerdown', () => {
        bg.disableInteractive();
        this.cameras.main.flash(180, 179, 102, 255);
        this.cameras.main.fadeOut(360, 10, 10, 15);
        this.cameras.main.once('camerafadeoutcomplete', () => {
          this.scene.start('EndingScene', { accused: sus.id, correct: sus.correct });
        });
      });
    });

    const back = makeButton(this, 20, 590, 140, 30, '← BACK', { fontSize:12, onClick: () => { this.scene.start('GameScene'); } });

    const ev = this.gs.collectedEvidence.length;
    const cn = this.gs.contradictionsTriggered.length;
    this.add.text(940, 600, `EVIDENCE ${String(ev).padStart(2,'0')}/16  ·  CONTRADICTIONS ${cn}/05`, {
      fontFamily: F.MONO, fontSize:'11px', color:C.MUTE_S, letterSpacing:2
    }).setOrigin(1,0.5);

    this.cameras.main.fadeIn(280, 10, 10, 15);
  }
}

class EndingScene extends Phaser.Scene {
  constructor() { super('EndingScene'); }

  init(data) {
    this.accused = data && data.accused;
    this.correct = !!(data && data.correct);
  }

  create() {
    const gs = this.registry.get('gameState');
    this.cameras.main.setBackgroundColor(this.correct ? '#0a030f' : '#14050d');
    drawCanvasFrame(this);

    const grid = this.add.graphics();
    grid.lineStyle(1, this.correct ? 0x1a0f2e : 0x2e0f1a, 1);
    for (let x = 0; x <= 960; x += 40) { grid.beginPath(); grid.moveTo(x,0); grid.lineTo(x,640); grid.strokePath(); }
    for (let y = 0; y <= 640; y += 40) { grid.beginPath(); grid.moveTo(0,y); grid.lineTo(960,y); grid.strokePath(); }

    this.add.rectangle(0, 0, 960, 38, C.BG_PANEL, 1).setOrigin(0,0);
    this.add.rectangle(0, 38, 960, 1, C.ACCENT).setOrigin(0,0);
    this.add.text(20, 12, '// CASE FILE — VERDICT', { fontFamily: F.UI, fontSize:'14px', fontStyle:'700', color:C.ACCENT_S, letterSpacing:4 });
    this.add.text(940, 12, this.correct ? '// CASE CLOSED' : '// CASE OPEN — UNRESOLVED', { fontFamily: F.MONO, fontSize:'11px', color:C.MUTE_S, letterSpacing:2 }).setOrigin(1,0);

    const verdict = this.correct ? 'CORRECT.' : 'INCORRECT.';
    const big = this.add.text(480, 130, verdict, { fontFamily: F.UI, fontSize:'90px', fontStyle:'700', color:C.ACCENT_S, letterSpacing:10 }).setOrigin(0.5).setAlpha(0);
    this.tweens.add({ targets: big, alpha:1, duration:400 });
    const tw = big.width + 80, th = big.height + 30;
    const border = this.add.rectangle(480, 130, tw, th, 0x000000, 0).setOrigin(0.5).setStrokeStyle(3, C.ACCENT).setAlpha(0);
    this.tweens.add({ targets: border, alpha:1, duration:400 });
    drawAllCornerMarks(this, 480-tw/2, 130-th/2, tw, th, C.ACCENT, 22);

    this.add.text(480, 200, this.correct ? '// YOU SAW THE SHAPE OF IT.' : '// SOMEONE IS WALKING FREE.', { fontFamily: F.MONO, fontSize:'13px', color:C.MUTE_S, letterSpacing:4 }).setOrigin(0.5);

    const cardX = 80, cardY = 250, cardW = 200, cardH = 280;
    this.add.rectangle(cardX, cardY, cardW, cardH, C.BG_PANEL, 1).setOrigin(0,0).setStrokeStyle(2, C.ACCENT);
    drawAllCornerMarks(this, cardX, cardY, cardW, cardH, C.ACCENT, 16);
    const sus = SUSPECTS.find(s => s.id === this.accused) || SUSPECTS[0];
    this.add.image(cardX + cardW/2, cardY + 110, sus.portrait).setOrigin(0.5).setDisplaySize(cardW-30, 196);
    this.add.rectangle(cardX + cardW/2, cardY + 110, cardW-28, 198, 0x000000, 0).setOrigin(0.5).setStrokeStyle(1, C.ACCENT, 0.6);
    this.add.text(cardX + cardW/2, cardY + 230, sus.name, { fontFamily: F.UI, fontSize:'22px', fontStyle:'700', color:C.LIGHT_S, letterSpacing:5 }).setOrigin(0.5);
    this.add.rectangle(cardX + cardW/2, cardY + 252, 60, 1, C.ACCENT).setOrigin(0.5);
    this.add.text(cardX + cardW/2, cardY + 264, this.correct ? 'CONVICTED' : 'ACCUSED', { fontFamily: F.MONO, fontSize:'11px', color: this.correct ? C.ACCENT_S : C.MUTE_S, letterSpacing:3 }).setOrigin(0.5);

    const bx = 320, by = 260, bw = 580, bh = 270;
    this.add.rectangle(bx, by, bw, bh, C.BG_PANEL, 0.95).setOrigin(0,0).setStrokeStyle(1, C.ACCENT, 0.6);
    drawAllCornerMarks(this, bx, by, bw, bh, C.ACCENT, 14);
    this.add.text(bx + 18, by + 16, '// CASE NOTES', { fontFamily: F.MONO, fontSize:'11px', color:C.ACCENT_S, letterSpacing:3 });
    this.add.rectangle(bx + 18, by + 36, bw - 36, 1, C.ACCENT, 0.4).setOrigin(0,0);

    const goodLines = [
      'The Scheduler planned everything.',
      'She cleared the TV studio with the anonymous letter.',
      'The knockout gas was bought in threes.',
      'The same panel type connects the labyrinth and the void.',
      'The phone in the lower maze was planted.',
      'The Void Case is closed.'
    ];
    const badLines = [
      'You picked the wrong silhouette.',
      'The timeline contradicts your conclusion.',
      'The true mastermind planned every detail.',
      'Someone else had the knowledge of the Void gate.',
      'The killer is still within the facility.',
      'And you let them walk away.'
    ];
    const lines = this.correct ? goodLines : badLines;

    lines.forEach((t, i) => {
      const txt = this.add.text(bx + 18, by + 56 + i*30, '> ' + t, {
        fontFamily: F.MONO, fontSize:'14px', color: i === lines.length-1 ? C.ACCENT_S : C.LIGHT_S,
        wordWrap:{ width: bw - 36, useAdvancedWrap:true }, fontStyle:'italic'
      }).setAlpha(0);
      this.tweens.add({ targets: txt, alpha:1, duration:260, delay: 600 + i*220 });
    });

    const ev = gs.collectedEvidence.length;
    const cn = gs.contradictionsTriggered.length;
    this.add.text(480, 555, `EVIDENCE COLLECTED ${String(ev).padStart(2,'0')}/16   ·   CONTRADICTIONS ${cn}/05`, {
      fontFamily: F.MONO, fontSize:'11px', color:C.MUTE_S, letterSpacing:3
    }).setOrigin(0.5);

    const btnLabel = this.correct ? '[ CASE CLOSED ]' : '[ TRY AGAIN ]';
    const btnX = (960 - 240) / 2;
    const btn = makeButton(this, btnX, 590, 240, 38, btnLabel, {
      fontSize: 16,
      onClick: () => {
        this.registry.set('gameState', {
          currentRoom: 'planetarium',
          collectedEvidence: [],
          visitedRooms: [],
          suspectsTalked: [],
          pins: {},
          contradictionsTriggered: [],
          gamePhase: 'intro'
        }); this.registry.set('initialGameState', {
          currentRoom: 'planetarium',
          collectedEvidence: [],
          visitedRooms: [],
          suspectsTalked: [],
          pins: {},
          contradictionsTriggered: [],
          gamePhase: 'intro'
        });
        if (this.correct) { window.completeCase('void'); window.showPostCaseMenu('void'); } else { this.scene.start('IntroScene'); }
      }
    });
    btn.setAlpha(0);
    this.tweens.add({ targets: btn, alpha: 1, duration: 400, delay: 1500 });

    this.cameras.main.fadeIn(360, 10, 10, 15);
  }
}
